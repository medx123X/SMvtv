<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Details — SMVtv</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .season-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .season-selector label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .season-dropdown {
      padding: 9px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 180px;
    }

    .season-dropdown:focus,
    .season-dropdown:hover {
      border-color: var(--accent);
    }

    .season-dropdown option {
      background: var(--bg-card);
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">SMVtv</a>
    <a href="index.html">Home</a>
    <a href="new-releases.html">New Releases</a>
    <div class="dropdown">
      <div class="dropbtn">Genre</div>
      <div class="dropdown-content">
        <a href="index.html">Action</a>
        <a href="index.html">Adventure</a>
        <a href="index.html">Comedy</a>
        <a href="index.html">Drama</a>
        <a href="index.html">Fantasy</a>
        <a href="index.html">Horror</a>
      </div>
    </div>
    <div class="dropdown">
      <div class="dropbtn">Type</div>
      <div class="dropdown-content">
        <a href="index.html">Series</a>
        <a href="index.html">Film</a>
        <a href="index.html">OVA</a>
        <a href="index.html">ONA</a>
        <a href="index.html">Special</a>
      </div>
    </div>
    <a href="about.html">About</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </nav>

  <div id="animeDetails" class="anime-details-container"></div>

  <script>
    // Theme toggle
    const html = document.documentElement;
    const saved = localStorage.getItem('smvtv-theme') || 'dark';
    html.setAttribute('data-theme', saved);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('smvtv-theme', next);
    });

    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    if (title) document.title = title + ' — SMVtv';

    let currentAnime = null;

    function renderEpisodes(episodes, seasonNum) {
      const container = document.getElementById('episodesContainer');
      container.innerHTML = episodes.map(ep => `
        <li>
          <a href="watch.html?title=${encodeURIComponent(currentAnime.title)}&season=${seasonNum}&ep=${ep.number}">
            Ep ${ep.number}
          </a>
        </li>
      `).join('');
    }

    function renderAnime(anime) {
      currentAnime = anime;
      const hasSeasons = anime.seasons && anime.seasons.length > 1;
      const container = document.getElementById('animeDetails');

      const seasonSelectorHTML = hasSeasons ? `
        <div class="season-selector">
          <label>Season:</label>
          <select class="season-dropdown" id="seasonDropdown">
            ${anime.seasons.map(s => `
              <option value="${s.season}">Season ${s.season} (${s.episodes.length} episodes)</option>
            `).join('')}
          </select>
        </div>
      ` : '';

      const initialEpisodes = hasSeasons ? anime.seasons[0].episodes : anime.episodes;
      const initialSeason = hasSeasons ? anime.seasons[0].season : 1;

      container.innerHTML = `
        <figure class="anime-figure">
          <div class="anime-image-container">
            <img src="${anime.image}" alt="${anime.title}">
          </div>
          <figcaption class="anime-info">
            <h2>${anime.title}</h2>
            <div class="meta">
              <span class="rating-badge">⭐ ${anime.rating}</span>
              ${hasSeasons
                ? `<span>${anime.seasons.length} Seasons</span>`
                : `<span>${anime.episodes.length} Episodes</span>`}
            </div>
            <p class="description">${anime.description}</p>
            ${anime.trailer
              ? `<div class="trailer"><iframe src="${anime.trailer}" frameborder="0" allowfullscreen></iframe></div>`
              : ''}
          </figcaption>
        </figure>

        <div class="episodes-container">
          <h3>Episodes</h3>
          ${seasonSelectorHTML}
          <ul id="episodesContainer"></ul>
        </div>
      `;

      renderEpisodes(initialEpisodes, initialSeason);

      if (hasSeasons) {
        document.getElementById('seasonDropdown').addEventListener('change', function () {
          const selectedSeason = parseInt(this.value);
          const seasonData = anime.seasons.find(s => s.season === selectedSeason);
          if (seasonData) renderEpisodes(seasonData.episodes, selectedSeason);
        });
      }
    }

    fetch('/api/anime')
      .then(res => res.json())
      .then(data => {
        const anime = data.find(a => a.title.toLowerCase() === (title || '').toLowerCase());
        const container = document.getElementById('animeDetails');

        if (!anime) {
          container.innerHTML = '<h2 style="text-align:center;padding:80px;color:var(--text-muted)">Anime not found.</h2>';
          return;
        }

        renderAnime(anime);
      })
      .catch(() => {
        document.getElementById('animeDetails').innerHTML =
          '<h2 style="text-align:center;padding:80px;color:var(--text-muted)">Failed to load. Is the server running?</h2>';
      });
  </script>
</body>
</html>
