<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SMVtv</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .auth-field {
      margin-bottom: 18px;
    }

    .auth-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .auth-field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .auth-field input:focus {
      border-color: var(--accent);
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      background: rgba(230, 57, 70, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #22c55e;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .auth-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">SMVtv</a>
    <a href="index.html">Home</a>
    <a href="new-releases.html">New Releases</a>
    <a href="about.html">About</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">SMVtv</div>
      <p class="auth-subtitle">Create your free account.</p>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="username" placeholder="cooluser123">
      </div>

      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>

      <div class="auth-field">
        <label>Password <span style="color:var(--text-muted);font-weight:400">(min 6 characters)</span></label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="auth-btn" id="registerBtn" onclick="register()">Create Account</button>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // Theme
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('smvtv-theme') || 'dark');
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('smvtv-theme', next);
    });

    // Redirect if already logged in
    if (localStorage.getItem('smvtv-token')) {
      window.location.href = 'index.html';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });

    async function register() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('registerBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!username || !email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Registration failed.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }

        // Save token and redirect
        localStorage.setItem('smvtv-token', data.token);
        localStorage.setItem('smvtv-username', data.username);

        successMsg.textContent = 'Account created! Redirecting...';
        successMsg.style.display = 'block';

        setTimeout(() => window.location.href = 'index.html', 1200);

      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
