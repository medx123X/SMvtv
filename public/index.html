<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMVtv — Anime Streaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .user-menu { display:flex; align-items:center; gap:10px; }
    .user-greeting { font-size:14px; font-weight:600; color:var(--text-primary); }
    .logout-btn {
      padding:6px 14px; background:transparent; border:1px solid var(--border);
      border-radius:6px; color:var(--text-secondary); font-family:'Outfit',sans-serif;
      font-size:13px; cursor:pointer; transition:all 0.2s;
    }
    .logout-btn:hover { border-color:var(--accent); color:var(--accent); }
    .login-link {
      padding:7px 18px; background:var(--accent); border-radius:6px;
      color:#fff !important; font-size:13px; font-weight:600;
      text-decoration:none; transition:opacity 0.2s;
    }
    .login-link:hover { opacity:0.85; }

    /* Card body row: title+rating on left, heart on right */
    .card-body {
      display: flex;
      flex-direction: column;
    }
    .card-body-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-body-info { flex: 1; min-width: 0; }
    .heart-btn {
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .heart-btn:hover { transform: scale(1.15); }
    .heart-btn svg { display: block; pointer-events: none; }
    .heart-btn .heart-outline { fill: none; stroke: #111; stroke-width: 2; transition: fill 0.2s, stroke 0.2s; }
    [data-theme="light"] .heart-btn .heart-outline { stroke: #333; }
    .heart-btn:hover .heart-outline { stroke: #8b0000; fill: rgba(139,0,0,0.1); }
    .heart-btn.saved .heart-outline { fill: #8b0000; stroke: #8b0000; }

    /* Toast */
    .toast {
      position:fixed; bottom:30px; left:50%;
      transform:translateX(-50%) translateY(100px);
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:10px; padding:12px 24px;
      font-size:14px; font-weight:600; color:var(--text-primary);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      transition:transform 0.3s ease; z-index:9999;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">SMVtv</a>
    <a href="index.html">Home</a>
    <a href="new-releases.html">New Releases</a>
    <div class="dropdown">
      <div class="dropbtn">Genre</div>
      <div class="dropdown-content">
        <a href="#" data-filter="genre" data-value="Action">Action</a>
        <a href="#" data-filter="genre" data-value="Adventure">Adventure</a>
        <a href="#" data-filter="genre" data-value="Comedy">Comedy</a>
        <a href="#" data-filter="genre" data-value="Drama">Drama</a>
        <a href="#" data-filter="genre" data-value="Fantasy">Fantasy</a>
        <a href="#" data-filter="genre" data-value="Horror">Horror</a>
      </div>
    </div>
    <div class="dropdown">
      <div class="dropbtn">Type</div>
      <div class="dropdown-content">
        <a href="#" data-filter="type" data-value="Series">Series</a>
        <a href="#" data-filter="type" data-value="Film">Film</a>
        <a href="#" data-filter="type" data-value="OVA">OVA</a>
        <a href="#" data-filter="type" data-value="ONA">ONA</a>
        <a href="#" data-filter="type" data-value="Special">Special</a>
      </div>
    </div>
    <a href="watchlist.html">My List</a>
    <a href="about.html">About</a>
    <div id="authNav"></div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </nav>

  <!-- HERO BANNER -->
  <section class="hero" id="heroBanner">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="heroContent">
      <span class="hero-badge">Featured</span>
      <h1 class="hero-title" id="heroTitle">Loading...</h1>
      <div class="hero-meta">
        <span class="hero-rating" id="heroRating">⭐ —</span>
        <span id="heroType">Series</span>
      </div>
      <p class="hero-description" id="heroDesc"></p>
      <div class="hero-buttons">
        <a href="#" class="btn-primary" id="heroWatch">▶ Watch Now</a>
        <a href="#" class="btn-secondary" id="heroInfo">More Info</a>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- SEARCH -->
  <section class="search-section">
    <h1>Find Your Favorite Anime On<span> SMVtv</span></h1>
    <div class="search-results-wrapper">
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Search anime by title..." autocomplete="off">
        <button id="searchBtn">Search</button>
      </div>
      <div class="search-results" id="searchResults" style="display:none;"></div>
    </div>
  </section>

  <!-- FILTER CHIPS -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" data-genre="all">All</button>
    <button class="filter-chip" data-genre="Action">Action</button>
    <button class="filter-chip" data-genre="Adventure">Adventure</button>
    <button class="filter-chip" data-genre="Comedy">Comedy</button>
    <button class="filter-chip" data-genre="Drama">Drama</button>
    <button class="filter-chip" data-genre="Fantasy">Fantasy</button>
    <button class="filter-chip" data-genre="Horror">Horror</button>
  </div>

  <!-- ANIME GRID -->
  <section class="anime-section">
    <div class="section-header">
      <h2>Popular Anime</h2>
      <a href="new-releases.html">View All →</a>
    </div>
    <div class="anime-grid" id="animeContainer"></div>
    <p class="no-results" id="noResults">No anime found matching your search.</p>
  </section>

  <!-- Watchlist Section -->
  <section class="anime-section" id="watchlistSection" style="display:none;">
    <div class="section-header">
      <h2>My List</h2>
      <a href="watchlist.html">View All →</a>
    </div>
    <div class="anime-grid" id="watchlistContainer"></div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    // ─── Theme ──────────────────────────────────────────────────────
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('smvtv-theme') || 'dark');
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('smvtv-theme', next);
    });

    // ─── Auth Nav ───────────────────────────────────────────────────
    const token = localStorage.getItem('smvtv-token');
    const username = localStorage.getItem('smvtv-username');
    const authNav = document.getElementById('authNav');
    if (username) {
      authNav.innerHTML = `
        <div class="user-menu">
          <span class="user-greeting">👤 ${username}</span>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>`;
    } else {
      authNav.innerHTML = `<a href="login.html" class="login-link">Sign In</a>`;
    }
    function logout() {
      localStorage.removeItem('smvtv-token');
      localStorage.removeItem('smvtv-username');
      window.location.reload();
    }

    // ─── Toast ──────────────────────────────────────────────────────
    function showToast(msg, color) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.borderColor = color || 'var(--border)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ─── State ──────────────────────────────────────────────────────
    let allAnime = [];
    let userWatchlist = [];
    let heroIndex = 0;
    let heroInterval;
    const FEATURED_COUNT = 5;

    // ─── Hero Banner ────────────────────────────────────────────────
    function setHero(anime, index) {
      heroIndex = index;
      document.getElementById('heroBg').style.backgroundImage = `url('${anime.image}')`;
      document.getElementById('heroTitle').textContent = anime.title;
      document.getElementById('heroRating').textContent = `⭐ ${anime.rating}`;
      document.getElementById('heroDesc').textContent = anime.description;
      document.getElementById('heroWatch').href = `watch.html?title=${encodeURIComponent(anime.title)}&ep=1&season=1`;
      document.getElementById('heroInfo').href = `show.html?title=${encodeURIComponent(anime.title)}`;
      document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function buildHeroDots(featured) {
      const dotsEl = document.getElementById('heroDots');
      dotsEl.innerHTML = '';
      featured.forEach((anime, i) => {
        const btn = document.createElement('button');
        btn.className = 'hero-dot' + (i === 0 ? ' active' : '');
        btn.addEventListener('click', () => { clearInterval(heroInterval); setHero(featured[i], i); startHeroRotation(featured); });
        dotsEl.appendChild(btn);
      });
    }

    function startHeroRotation(featured) {
      heroInterval = setInterval(() => { heroIndex = (heroIndex + 1) % featured.length; setHero(featured[heroIndex], heroIndex); }, 6000);
    }

    function initHero(data) {
      const featured = data.slice(0, FEATURED_COUNT);
      buildHeroDots(featured);
      setHero(featured[0], 0);
      startHeroRotation(featured);
    }

    // ─── Card HTML helper ────────────────────────────────────────────
    function cardHTML(anime) {
      const isSaved = userWatchlist.includes(anime.title);
      const safeTitle = anime.title.replace(/'/g, "\\'");
      return `
        <div class="anime-card">
          <div class="card-img-wrap">
            <img src="${anime.image}" alt="${anime.title}" loading="lazy">
          </div>
          <div class="card-body">
            <div class="card-body-row">
              <div class="card-body-info">
                <h3>${anime.title}</h3>
                <div class="card-rating">⭐ ${anime.rating}</div>
              </div>
              <button class="heart-btn ${isSaved ? 'saved' : ''}"
                onclick="toggleWatchlist('${safeTitle}')"
                id="bm-${encodeURIComponent(anime.title)}"
                title="${isSaved ? 'Already in your list' : 'Add to My List'}">
                <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path class="heart-outline" d="M12 21C12 21 3 13.5 3 8a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-9 13-9 13z"/></svg>
              </button>
            </div>
            <a href="show.html?title=${encodeURIComponent(anime.title)}" class="more-info">More Info</a>
          </div>
        </div>`;
    }

    // ─── Render Cards ────────────────────────────────────────────────
    function renderCards(list) {
      const container = document.getElementById('animeContainer');
      const noResults = document.getElementById('noResults');
      if (list.length === 0) { container.innerHTML = ''; noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      container.innerHTML = list.map(cardHTML).join('');
    }

    // ─── Render Watchlist Section ────────────────────────────────────
    function renderWatchlistSection(watchlistTitles) {
      const section = document.getElementById('watchlistSection');
      const container = document.getElementById('watchlistContainer');
      const watched = allAnime.filter(a => watchlistTitles.includes(a.title));
      if (watched.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = watched.map(cardHTML).join('');
    }

    // ─── Toggle Watchlist ────────────────────────────────────────────
    const heartSVG = `<svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path class="heart-outline" d="M12 21C12 21 3 13.5 3 8a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-9 13-9 13z"/></svg>`;

    async function toggleWatchlist(title) {
      if (!token) {
        showToast('🔒 Sign in to save anime to your list', '#e63946');
        return;
      }

      const encodedTitle = encodeURIComponent(title);
      const isSaved = userWatchlist.includes(title);

      if (isSaved) {
        // Optimistically remove
        userWatchlist = userWatchlist.filter(t => t !== title);
        document.querySelectorAll('[id="bm-' + encodedTitle + '"]').forEach(btn => {
          btn.classList.remove('saved');
          btn.innerHTML = heartSVG;
          btn.title = 'Add to My List';
        });
        renderWatchlistSection(userWatchlist);

        try {
          await fetch('/api/watchlist', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ title })
          });
          showToast('Removed from My List', 'var(--border)');
        } catch (err) {
          // Revert on failure
          userWatchlist.push(title);
          document.querySelectorAll('[id="bm-' + encodedTitle + '"]').forEach(btn => {
            btn.classList.add('saved');
            btn.innerHTML = heartSVG;
            btn.title = 'Already in your list';
          });
          renderWatchlistSection(userWatchlist);
          showToast('❌ Failed to remove. Try again.', '#e63946');
        }
      } else {
        // Optimistically add
        userWatchlist.push(title);
        document.querySelectorAll('[id="bm-' + encodedTitle + '"]').forEach(btn => {
          btn.classList.add('saved');
          btn.innerHTML = heartSVG;
          btn.title = 'Already in your list';
        });

        try {
          const res = await fetch('/api/watchlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ title })
          });
          const data = await res.json();
          if (res.ok) {
            userWatchlist = data.watchlist;
            showToast('✅ Added to My List!', '#22c55e');
            renderWatchlistSection(userWatchlist);
          }
        } catch (err) {
          // Revert on failure
          userWatchlist = userWatchlist.filter(t => t !== title);
          document.querySelectorAll('[id="bm-' + encodedTitle + '"]').forEach(btn => {
            btn.classList.remove('saved');
            btn.innerHTML = heartSVG;
            btn.title = 'Add to My List';
          });
          showToast('❌ Failed to add. Try again.', '#e63946');
        }
      }
    }

    // ─── Skeleton Loaders ────────────────────────────────────────────
    function showSkeletons() {
      document.getElementById('animeContainer').innerHTML = Array(8).fill(`
        <div class="skeleton-card">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-btn"></div>
        </div>`).join('');
    }

    // ─── Search ──────────────────────────────────────────────────────
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { searchResults.style.display = 'none'; return; }
      const matches = allAnime.filter(a => a.title.toLowerCase().includes(q)).slice(0, 6);
      if (!matches.length) { searchResults.style.display = 'none'; return; }
      searchResults.innerHTML = matches.map(a => `
        <a href="show.html?title=${encodeURIComponent(a.title)}" class="search-result-item">
          <img src="${a.image}" alt="${a.title}"><span>${a.title}</span>
        </a>`).join('');
      searchResults.style.display = 'block';
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { renderCards(allAnime); return; }
      renderCards(allAnime.filter(a => a.title.toLowerCase().includes(q)));
      searchResults.style.display = 'none';
    });

    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('searchBtn').click(); });
    document.addEventListener('click', e => { if (!e.target.closest('.search-results-wrapper')) searchResults.style.display = 'none'; });

    // ─── Genre Filter ────────────────────────────────────────────────
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const genre = chip.dataset.genre;
        if (genre === 'all') { renderCards(allAnime); return; }
        const filtered = allAnime.filter(a =>
          (a.genres && a.genres.includes(genre)) ||
          (a.description && a.description.toLowerCase().includes(genre.toLowerCase()))
        );
        renderCards(filtered.length ? filtered : allAnime);
      });
    });

    document.querySelectorAll('[data-filter]').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const value = link.dataset.value.toLowerCase();
        const filtered = allAnime.filter(a =>
          (a.description && a.description.toLowerCase().includes(value)) ||
          (a.genres && a.genres.map(g => g.toLowerCase()).includes(value)) ||
          (a.type && a.type.toLowerCase() === value)
        );
        renderCards(filtered.length ? filtered : allAnime);
        window.scrollTo({ top: document.querySelector('.anime-section').offsetTop - 80, behavior: 'smooth' });
      });
    });

    // ─── Init ────────────────────────────────────────────────────────
    async function init() {
      showSkeletons();
      // Fetch anime AND watchlist in parallel
      const [animeRes, watchlistRes] = await Promise.all([
        fetch('/api/anime').then(r => r.json()).catch(() => []),
        token ? fetch('/api/watchlist', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json()).catch(() => ({ watchlist: [] })) : Promise.resolve({ watchlist: [] })
      ]);

      allAnime = animeRes;
      userWatchlist = watchlistRes.watchlist || [];

      initHero(allAnime);
      renderCards(allAnime);
      if (token && userWatchlist.length > 0) renderWatchlistSection(userWatchlist);
    }

    init().catch(() => {
      document.getElementById('animeContainer').innerHTML =
        '<p style="color:var(--text-muted);text-align:center;padding:40px;grid-column:1/-1">Failed to load anime. Make sure the server is running.</p>';
    });
  </script>
</body>
</html>
